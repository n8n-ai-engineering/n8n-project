server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy REST API calls to the backend container
    location /api/ {
        proxy_pass         http://server:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_read_timeout 120s;
    }

    # Proxy webhook triggers to the backend container
    location /webhook/ {
        proxy_pass         http://server:3001/webhook/;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_read_timeout 120s;
    }

    # SPA fallback: serve index.html for every unmatched route
    location / {
        try_files $uri $uri/ /index.html;
    }
}
